name: Export HGCAL layer PDFs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "hgcalgeom/**"
      - "data/**"
      - "pyproject.toml"
      - ".github/workflows/export-layers.yml"
  pull_request:
    paths:
      - "hgcalgeom/**"
      - "data/**"
      - "pyproject.toml"
      - ".github/workflows/export-layers.yml"
  workflow_dispatch:
    inputs:
      layers:
        description: "Layers to export, for example 1-47 or 1,2,34-47"
        required: false
        default: "1-47"
      release_tag:
        description: "Existing or new release tag to attach PDFs to, for example v0.1.0"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  export-layer-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and PDF dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test,plot]'
          python -m pip install reportlab

      - name: Run tests
        run: |
          python -m pytest

      - name: Export layer PDF files
        run: |
          mkdir -p layers_export
          hgcalgeom export-all-layers \
            --silicon data/modmapv16.6_cmssw_flatfile.txt \
            --tiles data/tilefile-Nov2023-v3.txt \
            --output-dir layers_export \
            --layers "${{ github.event.inputs.layers || '1-47' }}" \
            --format pdf \
            --show-wafers \
            --show-cells \
            --show-tiles

      - name: Create compressed PDF bundle
        run: |
          tar -C layers_export -czf hgcal_layer_pdfs.tar.gz .

      - name: Upload PDF layer drawings as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hgcal-layer-pdfs
          path: layers_export/*.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Upload compressed PDF bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hgcal-layer-pdfs-tarball
          path: hgcal_layer_pdfs.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Resolve release tag
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        id: release_tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release if needed
        if: steps.release_tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "HGCAL layer PDF exports generated by GitHub Actions."
          fi

      - name: Upload PDFs to GitHub Release
        if: steps.release_tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            hgcal_layer_pdfs.tar.gz \
            layers_export/*.pdf \
            --clobber
